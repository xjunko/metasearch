<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>%%pageTitle%% // images</title>
    <meta name="theme-color" content="#1F1E2E" />
    <meta property="og:color" content="#89B4FA">
    <link rel="icon" href="/s/teto.png">
    
    <link
      title="search.tiago.zip"
      href="/s/opensearch.xml"
      rel="search"
      type="application/opensearchdescription+xml"
    />
    
    <meta
      name="description"
      content="search the web without AI slop. pretty, fast, privacy-friendly metasearch engine."
    />

    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://search.tiago.zip/" />
    <meta
      property="og:description"
      content="search the web without AI slop. pretty, fast, privacy-friendly metasearch engine."
    />
    <meta name="twitter:url" content="https://search.tiago.zip/" />
    <meta name="twitter:site" content="@0xtiago_" />
    <meta name="twitter:creator" content="@0xtiago_" />
    <meta
      name="twitter:description"
      content="search the web without AI slop. pretty, fast, privacy-friendly metasearch engine."
    />
    <style>
      /**css**/
    </style>
    <meta name="color-scheme" content="dark" />
    <meta http-equiv="x-ua-compatible" content="IE=edge,chrome=1" />
    <meta name="robots" content="noindex,nofollow" />
    <link
      title="search.tiago.zip"
      href="/s/opensearch.xml"
      rel="search"
      type="application/opensearchdescription+xml"
    />
    <link rel="preload" href="/s/inter-var-v4.woff2" as="font" type="font/woff2" />
  </head>
  <body>
    <header>
      <form action="/">
        <input type="hidden" name="type" value="images" />
        <div class="search-container">
          <div class="search-bar">
            <input name="q" value="%%inputValue%%" placeholder="search…" />
            <input type="hidden" name="pass" />

            <button title="search!" type="submit">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="currentColor"
                viewBox="0 0 24 24"
                aria-hidden="true"
                class="w-6 h-6"
                focusable="false"
                style="fill: currentColor"
              >
                <path
                  d="m18.031 16.617 4.283 4.282-1.415 1.415-4.282-4.283A8.96 8.96 0 0 1 11 20c-4.968 0-9-4.032-9-9s4.032-9 9-9 9 4.032 9 9a8.96 8.96 0 0 1-1.969 5.617m-2.006-.742A6.98 6.98 0 0 0 18 11c0-3.867-3.133-7-7-7s-7 3.133-7 7 3.133 7 7 7a6.98 6.98 0 0 0 4.875-1.975z"
                ></path>
              </svg>
            </button>
          </div>
        </div>
      </form>
      <nav class="tabs">
        <a href="/?q=%%inputValueEncoded%%&pass" class="tab">web</a>
        <a href="/?q=%%inputValueEncoded%%&type=images&pass" class="tab active">images</a>
        <a href="/?q=%%inputValueEncoded%%&type=news&pass" class="tab">news</a>
        <a href="/?q=%%inputValueEncoded%%&type=maps&pass" class="tab">maps</a>

        <button class="opt" id="options-btn">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="icon icon-tabler icons-tabler-outline icon-tabler-chevron-down"
          >
            <path stroke="none" d="M0 0h24v24H0z" fill="none" />
            <path d="M6 9l6 6l6 -6" />
          </svg>
        </button>
      </nav>

      <div class="options-popup" id="options-popup">
        <div class="option-item">
          <div class="option-content">
            <div class="option-label">
              hide ai
              <a
                href="https://github.com/laylavish/uBlockOrigin-HUGE-AI-Blocklist"
                target="_blank"
                rel="noopener"
                ><svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  class="icon icon-tabler icons-tabler-outline icon-tabler-help"
                >
                  <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                  <path d="M3 12a9 9 0 1 0 18 0a9 9 0 1 0 -18 0" />
                  <path d="M12 17l0 .01" />
                  <path d="M12 13.5a1.5 1.5 0 0 1 1 -1.5a2.6 2.6 0 1 0 -3 -4" /></svg
              ></a>
            </div>
          </div>
          <label class="switch">
            <input type="checkbox" id="hide-ai-slop" />
            <span class="slider"></span>
          </label>
        </div>
        <div class="option-item">
          <div class="option-content">
            <div class="option-label">details sidebar</div>
          </div>
          <label class="switch">
            <input type="checkbox" id="details-sidebar" />
            <span class="slider"></span>
          </label>
        </div>
      </div>
    </header>

    <div class="body images-body">
      <main class="images-main">
        <div class="images-grid" id="images-grid"></div>
        <div id="loading-indicator" class="loading-indicator" style="display: none">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="icon icon-tabler icons-tabler-outline icon-tabler-loader-2"
          >
            <path stroke="none" d="M0 0h24v24H0z" fill="none" />
            <path d="M12 3a9 9 0 1 0 9 9" />
          </svg>
        </div>
        <div id="load-more-sentinel" style="height: 1px; width: 100%"></div>
      </main>
    </div>

    <script src="/p/%%jsJwt%%"></script>
  </body>
  <script defer data-domain="metasearch.tiago.zip" src="https://a.tiago.zip/js/script.js"></script>
</html>
