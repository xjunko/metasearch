<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>%%pageTitle%% // news</title>
  <meta name="theme-color" content="#1F1E2E" />
  <meta property="og:color" content="#89B4FA">
  <link rel="icon" href="/s/teto.png">

  <link title="search.kafu.ovh" href="/s/opensearch.xml" rel="search" type="application/opensearchdescription+xml" />

  <meta name="description"
    content="search the web without AI slop. pretty, fast, privacy-friendly metasearch engine." />

  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://search.kafu.ovh/" />
  <meta property="og:description"
    content="search the web without AI slop. pretty, fast, privacy-friendly metasearch engine." />
  <meta name="twitter:url" content="https://search.kafu.ovh/" />


  <meta name="twitter:description"
    content="search the web without AI slop. pretty, fast, privacy-friendly metasearch engine." />
  <style>
    /**css**/
  </style>
  <meta name="color-scheme" content="dark" />
  <meta http-equiv="x-ua-compatible" content="IE=edge,chrome=1" />
  <meta name="robots" content="noindex,nofollow" />
  <link title="search.kafu.ovh" href="/s/opensearch.xml" rel="search" type="application/opensearchdescription+xml" />
  <link rel="preload" href="/s/inter-var-v4.woff2" as="font" type="font/woff2" />
</head>

<body>
  <header>
    <form action="/">
      <input type="hidden" name="type" value="news" />
      <div class="search-container">
        <div class="search-bar">
          <input name="q" value="%%inputValue%%" placeholder="search…" />
          <input type="hidden" name="pass" />

          <button title="search!" type="submit">
            <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true"
              class="w-6 h-6" focusable="false" style="fill: currentColor">
              <path
                d="m18.031 16.617 4.283 4.282-1.415 1.415-4.282-4.283A8.96 8.96 0 0 1 11 20c-4.968 0-9-4.032-9-9s4.032-9 9-9 9 4.032 9 9a8.96 8.96 0 0 1-1.969 5.617m-2.006-.742A6.98 6.98 0 0 0 18 11c0-3.867-3.133-7-7-7s-7 3.133-7 7 3.133 7 7 7a6.98 6.98 0 0 0 4.875-1.975z">
              </path>
            </svg>
          </button>
        </div>
      </div>
    </form>
    <nav class="tabs">
      <a href="/?q=%%inputValueEncoded%%&pass" class="tab">web</a>
      <a href="/?q=%%inputValueEncoded%%&type=images&pass" class="tab">images</a>
      <a href="/?q=%%inputValueEncoded%%&type=news&pass" class="tab active">news</a>
      <a href="/?q=%%inputValueEncoded%%&type=maps&pass" class="tab">maps</a>
    </nav>
  </header>

  <div class="body news-body">
    <main class="news-main">
      <div class="news-results" id="news-results"></div>
      <div id="loading-indicator" class="loading-indicator" style="display: none">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
          class="icon icon-tabler icons-tabler-outline icon-tabler-loader-2">
          <path stroke="none" d="M0 0h24v24H0z" fill="none" />
          <path d="M12 3a9 9 0 1 0 9 9" />
        </svg>
      </div>
      <div id="load-more-sentinel"></div>
    </main>
  </div>

  <script src="/p/%%jsJwt%%"></script>
</body>


</html>
