<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>bangs / search.kafu.ovh</title>
  <meta name="theme-color" content="#1F1E2E" />
  <meta property="og:color" content="#89B4FA" />
  <link rel="icon" href="/s/teto.png" />

  <meta name="color-scheme" content="dark" />
  <meta http-equiv="x-ua-compatible" content="IE=edge,chrome=1" />
  <meta name="robots" content="index,follow" />

  <meta name="description"
    content="search the web without AI slop. pretty, fast, privacy-friendly metasearch engine." />

  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://search.kafu.ovh/" />
  <meta property="og:description"
    content="search the web without AI slop. pretty, fast, privacy-friendly metasearch engine." />
  <meta name="twitter:url" content="https://search.kafu.ovh/" />

  <meta name="twitter:creator" content="@tiagozip_" />
  <meta name="twitter:description"
    content="search the web without AI slop. pretty, fast, privacy-friendly metasearch engine." />

  <style>
    * {
      box-sizing: border-box;
      min-width: 0;
      text-underline-offset: 3px;
      -webkit-tap-highlight-color: rgba(255, 255, 255, 0);
    }

    :root {
      color-scheme: dark;
      interpolate-size: allow-keywords;
      font-family:
        InterVar,
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        Roboto,
        Oxygen,
        Ubuntu,
        Cantarell,
        "Open Sans",
        "Helvetica Neue",
        sans-serif;
      --text: #cdd6f4;
      --bg: #1f1e2e;
      --surface0: #313244;
      --card-bg: #1e1e2e;
      --card-hover: #262738;
      --subtext: #a6adc8;
      --blue: #89b4fa;
      --muted: #7f849c;
      --border: #45475a;
    }

    html {
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
      text-size-adjust: 100%;
      scrollbar-width: thin;
      scrollbar-color: hsla(255 0 255 / 15%) var(--bg);
      background-color: var(--bg);
      overflow-x: hidden;
      scrollbar-gutter: stable;
    }

    body {
      display: flex;
      width: 100%;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      flex-direction: column;
      overflow-x: hidden;

      header {
        max-width: 1136px;
        margin: 15px auto 0;
        width: 100%;
        padding: 0 18px;
        display: flex;
        flex-direction: column;

        .search-container {
          display: flex;
          gap: 24px;

          .search-bar {
            height: 40px;
            background-color: var(--surface0);
            border: 1px solid #7f849c78;
            width: 100%;
            border-radius: 6px;
            display: flex;
            max-width: 672px;
            cursor: text;

            &:has(input:focus) {
              border-color: #bac2de;
              outline: rgb(186, 194, 222) 0.5px solid;
            }

            input {
              background-color: transparent;
              border: none;
              height: 100%;
              width: 100%;
              padding: 0 10px 0 0;
              font-size: 1em;
              font-family: inherit;
              color: var(--text);

              &:focus {
                outline: none;
              }

              &::placeholder {
                color: var(--muted);
                user-select: none;
              }
            }

            button {
              aspect-ratio: 1;
              height: 100%;
              border-radius: 13.6px;
              border: none;
              background-color: transparent;
              cursor: pointer;
              display: flex;
              align-items: center;
              color: var(--text);
              transform: scale(0.9);
              justify-content: center;

              svg {
                width: 20px;
                height: 28px;
              }
            }
          }
        }
      }

      .body {
        max-width: 1136px;
        margin: 0 auto;
        display: flex;
        width: 100%;
        padding: 0 18px 40px 18px;
        flex-direction: column;

        main {
          width: 100%;
          color: var(--text);
          max-width: 672px;

          .loader {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--subtext);
            padding: 10px 0px;

            svg {
              animation: spin 0.8s linear infinite;
            }
          }

          .bang-results {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 20px;

            @media (max-width: 700px) {
              grid-template-columns: 1fr;
            }

            .bang {
              display: flex;
              gap: 12px;
              padding: 8px 12px;
              border-radius: 12px;
              align-items: center;
              overflow: hidden;
              cursor: default;
              text-decoration: none;
              color: inherit;
              background: var(--card-hover);

              .bang-icon {
                background-color: var(--surface0);
                outline: 2px solid var(--surface0);
                outline-offset: -1px;
                border-radius: 7px;
                width: 32px;
                height: 32px;
                min-width: 32px;
                position: relative;
                user-select: none;

                &>* {
                  width: 32px;
                  height: 32px;
                  aspect-ratio: 1/1;
                  border-radius: 7px;
                  display: flex;
                  align-items: center;
                  justify-content: center;
                  object-fit: cover;
                  animation: fade-in 0.2s backwards;
                }

                &>.failed {
                  color: var(--muted);
                  opacity: 0.8;

                  svg {
                    width: 21px;
                    height: 21px;
                  }
                }

                &>.shimmer {
                  --shimmer-size: 120px;
                  background-image: linear-gradient(-60deg,
                      rgba(0, 0, 0, 0) 40%,
                      var(--border) 50%,
                      rgba(0, 0, 0, 0) 60%);
                  background-repeat: no-repeat;
                  animation: svelte-shimmer 1.5s infinite linear;
                  background-size: var(--shimmer-size) 100%;
                }
              }

              .bang-info {
                width: 100%;
                overflow: hidden;
                display: flex;
                flex-direction: column;
                gap: 2px;

                .bang-title {
                  font-size: 16px;
                  white-space: nowrap;
                  -webkit-mask-image: linear-gradient(to right, #000 90%, #0000);
                  mask-image: linear-gradient(to right, #000 90%, #0000);
                  font-weight: 500;
                }

                .bang-triggers {
                  font-size: 15px;
                  color: var(--blue);
                  white-space: nowrap;
                  overflow: hidden;
                  text-overflow: ellipsis;
                }

                .bang-url {
                  color: var(--subtext);
                  font-size: 13px;
                  text-decoration: none;
                  white-space: nowrap;
                  overflow: hidden;
                  text-overflow: ellipsis;

                  &:hover {
                    text-decoration: underline;
                    color: var(--blue);
                  }
                }
              }
            }

            .poweredBy {
              display: flex;
              align-items: center;
              gap: 6px;
              text-decoration: none;
              color: var(--text);
              margin-top: 12px;
              width: fit-content;
              transition: transform 0.2s;

              &:hover {
                transform: scale(1.03);
              }

              &:active {
                transform: scale(0.95);
              }

              svg {
                width: 16px;
                height: 16px;
              }
            }
          }
        }
      }
    }

    .hidden {
      display: none !important;
    }

    @keyframes svelte-shimmer {
      0% {
        background-position: calc(-1 * var(--shimmer-size)) 0;
      }

      100% {
        background-position: var(--shimmer-size) 0;
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes fade-in {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @font-face {
      font-family: "InterVar";
      font-display: swap;
      src: url("/s/inter-var-v4.woff2");
    }
  </style>
</head>

<body>
  <header>
    <div class="search-container">
      <div class="search-bar">
        <button>
          <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true"
            class="w-6 h-6" focusable="false" style="fill: currentColor">
            <path
              d="m18.031 16.617 4.283 4.282-1.415 1.415-4.282-4.283A8.96 8.96 0 0 1 11 20c-4.968 0-9-4.032-9-9s4.032-9 9-9 9 4.032 9 9a8.96 8.96 0 0 1-1.969 5.617m-2.006-.742A6.98 6.98 0 0 0 18 11c0-3.867-3.133-7-7-7s-7 3.133-7 7 3.133 7 7 7a6.98 6.98 0 0 0 4.875-1.975z">
            </path>
          </svg>
        </button>
        <input id="searchInput" value="" placeholder="" autocomplete="off" />
      </div>
    </div>
  </header>

  <div class="body">
    <main>
      <div id="loader" class="loader">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 3a9 9 0 1 0 9 9" />
        </svg>
        <p>loading bangs...</p>
      </div>
      <div id="results" class="bang-results"></div>
    </main>
  </div>

  <script type="module">
    import * as fflate from "/s/fflate.min.js";

    const ICON_CACHE = new Map();
    const ZIP_CACHE = new Map();

    const getBucket = (url) => {
      const hostname = new URL(url).hostname.replace(/^www\./, "");
      const char = hostname.charAt(0);
      if ("abcdefghilmnoprstw".includes(char)) return char;
      const buckets = ["kv", "uj", "qxyz0123456789"];
      for (const bucket of buckets) if (bucket.includes(char)) return bucket;
      return "qxyz0123456789";
    };

    async function fetchIcon(bang) {
      const hostname = bang.urlObj.hostname.replace(/^www\./, "");
      if (ICON_CACHE.has(hostname)) return ICON_CACHE.get(hostname);

      const bucket = getBucket(bang.u);
      try {
        let zipEntries = ZIP_CACHE.get(bucket);
        if (!zipEntries) {
          const resp = await fetch(`https://files.helium.computer/favicons/${bucket}.zip`);
          if (!resp.ok) return null;
          const buffer = await resp.arrayBuffer();
          zipEntries = fflate.unzipSync(new Uint8Array(buffer));
          ZIP_CACHE.set(bucket, zipEntries);
        }
        const entryName = Object.keys(zipEntries).find((k) =>
          k.toLowerCase().startsWith(hostname.toLowerCase()),
        );
        if (entryName) {
          const blob = new Blob([zipEntries[entryName]], {
            type: "image/png",
          });
          const objUrl = URL.createObjectURL(blob);
          ICON_CACHE.set(hostname, objUrl);
          return objUrl;
        }
      } catch { }
      return null;
    }

    const calculateFuzzyScore = (query, target) => {
      let t = 0,
        g = 0,
        n = 0;
      for (const s of target) {
        if (t >= query.length) break;
        if (/^\s/.test(s)) continue;
        if (s === query[t]) {
          if (s === "." && g >= t) {
            t += 3;
            g += 3;
          } else {
            t++;
            g++;
          }
        } else {
          n = Math.max(g, n);
          g = 0;
        }
      }
      return t + n + 3 * g;
    };

    const getScore = (bang, query) => {
      let score = 0,
        maxT = 0;
      for (const t of bang.triggers) {
        if (t === query) maxT = Math.max(30, maxT);
        else maxT = Math.max(0.8 * calculateFuzzyScore(query, t), maxT);
      }
      score += maxT;
      const hostname = bang.urlObj.hostname.replace(/^www\./, "");
      score += 0.8 * calculateFuzzyScore(query, bang.name.toLowerCase());
      score += 0.8 * calculateFuzzyScore(query, hostname);
      return score;
    };

    let allBangs = [];
    const inputEl = document.getElementById("searchInput");
    const resultsEl = document.getElementById("results");
    const loaderEl = document.getElementById("loader");

    const normalize = (q) => {
      let clean = q.toLowerCase().trim();
      if (clean.startsWith("!") && clean.length > 1) clean = clean.slice(1);
      return clean.replace(/\s/g, "");
    };

    (async () => {
      try {
        const res = await fetch("https://files.helium.computer/bangs.json");
        let text = await res.text();
        text = text
          .replace(/^\/\/.*$/gm, "")
          .replace(/,(\s*])/g, "$1")
          .replace(/,(\s*})/g, "$1");
        const rawData = JSON.parse(text);
        inputEl.placeholder = `search ${rawData.length.toLocaleString("en-US")} bangs…`;

        const processed = {};
        for (const item of rawData) {
          let existing = processed[item.u];
          if (!existing) {
            processed[item.u] = item;
            existing = item;
          }

          const combined = new Set([
            existing.t,
            item.t,
            ...(existing.ts || []),
            ...(item.ts || []),
          ]);
          existing.ts = [...combined]
            .filter((x) => typeof x === "string")
            .sort((a, b) => a.length - b.length);
        }

        allBangs = Object.values(processed).map((s) => ({
          name: s.s,
          triggers: s.ts,
          u: s.u,
          urlObj: new URL(s.u),
        }));

        loaderEl.classList.add("hidden");
        inputEl.focus();
        performSearch("");
      } catch (e) {
        loaderEl.innerHTML = `<p style="color:#f38ba8">${e.message}</p>`;
      }
    })();

    const FEATURED = new Set([
      "co",
      "github",
      "ddg",
      "k",
      "w",
      "claude",
      "wa",
      "nebula",
      "mdn",
      "genius",
      "gi",
      "yt",
      "chatgpt",
      "x",
    ]);

    function performSearch(rawQuery) {
      const query = normalize(rawQuery);
      let results = [];

      if (query === "") {
        results = allBangs.filter((b) => b.triggers.some((t) => FEATURED.has(t))).slice(0, 14);
      } else {
        const scored = allBangs.map((bang) => ({
          bang,
          score: getScore(bang, query),
        }));
        scored.sort((a, b) => b.score - a.score || a.bang.name.length - b.bang.name.length);
        if (scored.length > 0) {
          const topScore = scored[0].score;
          results = scored
            .filter((i) => i.score > topScore / 4)
            .slice(0, 20)
            .map((i) => i.bang);
        }
      }
      renderResults(results, rawQuery);
    }

    function renderResults(bangs, rawQuery) {
      resultsEl.innerHTML = "";

      if (bangs.length === 0) {
        resultsEl.innerHTML = `<div style="grid-column: 1 / -1; text-align:center; color:var(--subtext); padding:20px;">No results found</div>`;
        return;
      }

      const frag = document.createDocumentFragment();

      bangs.forEach((bang) => {
        const card = document.createElement("div");
        card.className = "bang";

        const iconWrap = document.createElement("div");
        iconWrap.className = "bang-icon";

        const shimmer = document.createElement("div");
        shimmer.className = "shimmer";
        iconWrap.appendChild(shimmer);

        fetchIcon(bang).then((url) => {
          iconWrap.innerHTML = "";

          if (url) {
            const img = document.createElement("img");
            img.className = "icon";
            img.src = url;
            iconWrap.appendChild(img);
          } else {
            const failedDiv = document.createElement("div");
            failedDiv.className = "failed";
            failedDiv.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>`;
            iconWrap.appendChild(failedDiv);
          }
        });

        const info = document.createElement("div");
        info.className = "bang-info";

        const title = document.createElement("div");
        title.className = "bang-title";
        title.textContent = bang.name;

        const triggers = document.createElement("div");
        triggers.className = "bang-triggers";
        const t = normalize(rawQuery);
        const sortedTriggers = [...bang.triggers].sort((a, b) => {
          if (a === t) return -1;
          return a.length - b.length;
        });
        const displayStr = sortedTriggers
          .slice(0, 4)
          .map((x) => `!${x}`)
          .join(", ");
        triggers.textContent = displayStr + (sortedTriggers.length > 4 ? "..." : "");

        const urlLink = document.createElement("a");
        urlLink.className = "bang-url";
        urlLink.textContent = bang.urlObj.hostname;
        urlLink.href = bang.urlObj.origin;
        urlLink.target = "_blank";
        urlLink.rel = "noopener noreferrer";

        info.appendChild(title);
        info.appendChild(triggers);
        info.appendChild(urlLink);

        card.appendChild(iconWrap);
        card.appendChild(info);
        frag.appendChild(card);
      });

      resultsEl.appendChild(frag);

      const poweredBy = document.createElement("a");
      poweredBy.href = "https://helium.computer/bangs";
      poweredBy.target = "_blank";
      poweredBy.classList.add("poweredBy");
      poweredBy.innerHTML = `<svg role="img" aria-label="Helium" width="26" height="26" viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12.1555 0.818897C12.1555 0.366633 12.5221 0 12.9744 0C13.4267 0 13.7933 0.366633 13.7933 0.818897V25.1811C13.7933 25.6334 13.4267 26 12.9744 26C12.5221 26 12.1555 25.6334 12.1555 25.1811V0.818897Z" fill="currentColor"></path><path d="M1.51522 2.68744C1.19542 2.36764 1.19542 1.84914 1.51522 1.52934C1.83502 1.20954 2.35352 1.20954 2.67332 1.52934L24.4962 23.3522C24.816 23.672 24.816 24.1905 24.4962 24.5103C24.1764 24.8301 23.6579 24.8301 23.3381 24.5103L1.51522 2.68744Z" fill="currentColor"></path><path d="M23.3381 1.5293C23.6579 1.2095 24.1764 1.2095 24.4962 1.5293C24.816 1.8491 24.816 2.3676 24.4962 2.68739L2.67334 24.5103C2.35354 24.8301 1.83505 24.8301 1.51525 24.5103C1.19545 24.1905 1.19545 23.672 1.51525 23.3522L23.3381 1.5293Z" fill="currentColor"></path><path d="M25.1811 12.2067C25.6334 12.2067 26 12.5733 26 13.0256C26 13.4779 25.6334 13.8445 25.1811 13.8445L0.818897 13.8445C0.366633 13.8445 -1.97691e-08 13.4779 0 13.0256C1.97691e-08 12.5733 0.366633 12.2067 0.818897 12.2067L25.1811 12.2067Z" fill="currentColor"></path></svg> <span>bangs by helium</a>`;
      resultsEl.appendChild(poweredBy);
    }

    inputEl.addEventListener("input", (e) => performSearch(e.target.value));
  </script>
</body>


</html>
