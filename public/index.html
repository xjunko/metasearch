  <style>
    * {
      box-sizing: border-box;
      min-width: 0;

    }

    :root {
      color-scheme: dark;
      interpolate-size: allow-keywords;
      font-family:
        InstrumentSans,
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        Roboto,

        Ubuntu,
        Cantarell,
        "Open Sans",
        "Helvetica Neue",
        sans-serif;

    html {
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      -webkit-text-size-adjust: 100%;
      -moz-text-size-adjust: 100%;
      -ms-text-size-adjust: 100%;
      text-size-adjust: 100%;

      background-color: #1f1e2e;
      --text: #cdd6f4;
      scrollbar-gutter: stable;
      overflow-x: hidden;
    }

    input,
    textarea,
    select {
      field-sizing: content;
    }

    body {
      display: flex;
      width: 100%;
      margin: 0px;
      padding: 0px;
      min-height: 100vh;
      flex-direction: column;
      overflow-x: hidden;
      height: 100vh;
    }

    header {
      max-width: 1136px;
      margin: 0px auto;
      width: 100%;
      padding-left: 18px;
      padding-right: 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin-top: 12vh;

      .teto {
        margin-bottom: 2em;
        user-select: none;
        transition: transform 0.2s;

        &.is-on {
          cursor: pointer;
          transform: scale(1.1);

          &:active {
            transform: scale(0.9);
          }
        }
      }

      form {
        width: 100%;
        max-width: 500px;
      }
    }

    .search-container {
      display: flex;
      gap: 24px;

      .search-bar {
        height: 40px;
        background-color: #313244;
        border: 1px solid #7f849c78;
        width: 100%;
        border-radius: 6px;
        display: flex;
        max-width: 672px;
        cursor: text;

        &:has(input:focus) {
          border-color: #bac2de;
          outline: rgb(186, 194, 222) 0.5px solid;
        }

        input {
          background-color: transparent;
          border: none;
          height: 100%;
          width: 100%;
          padding: 0 10px;
          font-size: 1em;
          font-family: inherit;
          color: var(--text);

          &:focus {
            outline: none;
          }

          &::placeholder {
            color: #7f849c;
            user-select: none;
          }
        }

        button {
          aspect-ratio: 1;
          height: 100%;
          border-radius: 13.6px;
          border: none;
          background-color: transparent;
          cursor: pointer;
          display: flex;
          align-items: center;
          color: var(--text);
          transform: scale(0.9);
          justify-content: center;

          svg {
            width: 20px;
            height: 28px;
          }
        }
      }
    }

    .links {
      font-size: 15px;
      margin-top: 14px;
      color: #cdd6f769;
      user-select: none;

      a {
        color: var(--text);
        text-decoration: none;

        &:hover {
          text-decoration: underline;
        }

        b {
          font-weight: 500;
        }
      }
    }

    .workers {
      font-size: 12px;
      color: #7f849ccc;
      margin-top: auto;
      margin-bottom: 5vh;
      user-select: none;
      display: flex;
      align-items: center;
      gap: 6px;

      svg {
        width: 24px;
        height: 24px;
        margin-top: -3px;
      }
    }

    @font-face {
      font-family: "InstrumentSans";
      font-display: swap;
      src: url("/s/inter-var-v4.woff2");
    }

    @view-transition {
      navigation: auto;
    }

    ::view-transition-old(root),
    ::view-transition-new(root) {
      animation-duration: 0.1s;
    }

<body>
  <header>
    <img src="/s/teto_big.webp" style="width: 110px; height: 110px" alt="teto" class="teto" draggable="false" />
    <form action="/">
      <div class="search-container">
        <div class="search-bar">
          <input class="searchinput" name="q" placeholder="search…" autofocus />

          <button title="search!" type="submit">
            <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true"
              class="w-6 h-6" focusable="false" style="fill: currentColor">
              <path
                d="m18.031 16.617 4.283 4.282-1.415 1.415-4.282-4.283A8.96 8.96 0 0 1 11 20c-4.968 0-9-4.032-9-9s4.032-9 9-9 9 4.032 9 9a8.96 8.96 0 0 1-1.969 5.617m-2.006-.742A6.98 6.98 0 0 0 18 11c0-3.867-3.133-7-7-7s-7 3.133-7 7 3.133 7 7 7a6.98 6.98 0 0 0 4.875-1.975z">
              </path>
            </svg>
          </button>
        </div>
      </div>
    </form>
    <div class="links">
      <a href="https://github.com/tiagozip/metasearch" target="_blank"><b>self-host!</b></a> ·
      <a href="/about" target="_blank">about</a> · <a href="/api" target="_blank">api</a> ·
      <a href="/bangs" target="_blank">bangs</a> ·
      <a href="/translate" target="_blank">translate</a> ·
      <span>cf %%colo%%</span>
    </div>
  </header>

  <script>
    document.querySelector("input.searchinput").addEventListener("input", () => {
      document.title = document.querySelector("input").value || "search!";
    });

    (() => {
      const teto = document.querySelector(".teto");
      if (!teto) return;

      const hitCanvas = document.createElement("canvas");
      const hitCtx = hitCanvas.getContext("2d", { willReadFrequently: true });
      const setupHit = () => {
        hitCanvas.width = teto.naturalWidth;
        hitCanvas.height = teto.naturalHeight;
        hitCtx.drawImage(teto, 0, 0);
      };
      if (teto.complete && teto.naturalWidth) setupHit();
      else teto.addEventListener("load", setupHit, { once: true });

      const isOnPlushie = (e) => {
        if (!hitCanvas.width) return false;
        const rect = teto.getBoundingClientRect();
        const x = ((e.clientX - rect.left) / rect.width) * hitCanvas.width;
        const y = ((e.clientY - rect.top) / rect.height) * hitCanvas.height;
        if (x < 0 || y < 0 || x >= hitCanvas.width || y >= hitCanvas.height) return false;
        try {
          return hitCtx.getImageData(x | 0, y | 0, 1, 1).data[3] > 30;
        } catch {
          return true;
        }
      };

      teto.addEventListener("pointermove", (e) => {
        teto.classList.toggle("is-on", isOnPlushie(e));
      });
      teto.addEventListener("pointerleave", () => {
        teto.classList.remove("is-on");
      });

      const canvas = document.createElement("canvas");
      canvas.style.cssText =
        "position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:9999";
      document.body.appendChild(canvas);

      const ctx = canvas.getContext("2d");
      const img = new Image();
      img.src = "/s/teto.png";

      const dpr = window.devicePixelRatio || 1;
      const resize = () => {
        canvas.width = window.innerWidth * dpr;
        canvas.height = window.innerHeight * dpr;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      };
      resize();
      window.addEventListener("resize", resize);

      const particles = [];
      let raf = 0;
      let last = 0;

      const tick = (now) => {
        const dt = last ? Math.min((now - last) / 1000, 0.05) : 0;
        last = now;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];
          p.vy += 1400 * dt;
          p.x += p.vx * dt;
          p.y += p.vy * dt;
          p.rotation += p.spin * dt;
          p.life -= dt;

          if (p.life <= 0 || p.y > window.innerHeight + 200) {
            particles.splice(i, 1);
            continue;
          }

          const alpha = Math.min(1, p.life / 0.6);
          ctx.save();
          ctx.globalAlpha = alpha;
          ctx.translate(p.x, p.y);
          ctx.rotate(p.rotation);
          ctx.drawImage(img, -p.size / 2, -p.size / 2, p.size, p.size);
          ctx.restore();
        }

        if (particles.length) {
          raf = requestAnimationFrame(tick);
        } else {
          raf = 0;
          last = 0;
        }
      };

      const spawn = (e) => {
        const rect = teto.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;
        const count = window.innerWidth < 600 ? 18 : 32;

        for (let i = 0; i < count; i++) {
          const angle = Math.random() * Math.PI * 2;
          const speed = 300 + Math.random() * 600;
          particles.push({
            x: cx + (Math.random() - 0.5) * 20,
            y: cy + (Math.random() - 0.5) * 20,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - 400,
            rotation: Math.random() * Math.PI * 2,
            spin: (Math.random() - 0.5) * 12,
            size: 30 + Math.random() * 40,
            life: 1.8 + Math.random() * 0.8,
          });
        }

        if (!raf) raf = requestAnimationFrame(tick);
      };

      teto.addEventListener("click", (e) => {
        if (!isOnPlushie(e)) return;
        spawn(e);
      });
    })();
  </script>
</body>
